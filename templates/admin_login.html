<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IdentiFace — Admin Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='ui.css') }}">
    <script>
        (function () {
            var t = localStorage.getItem('admin-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
</head>
<body>

    <button class="login-theme-btn" onclick="toggleTheme()" title="Toggle theme">
        <i class="fas fa-moon" id="theme-icon"></i>
    </button>

    <div class="login-wrap">
        <div class="login-logo">
            <div class="login-logo-mark">IF</div>
            <div>
                <div class="login-logo-text">IdentiFace</div>
                <div class="login-logo-sub">Admin Portal</div>
            </div>
        </div>

        <div class="login-card">
            <div class="login-title">Welcome back</div>
            <div class="login-sub">Sign in to access the admin dashboard</div>

            {% if error %}
            <div class="login-error">
                <i class="fas fa-exclamation-circle"></i>
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="/admin/login">
                <div class="login-field">
                    <label class="login-label" for="username">Username</label>
                    <div class="login-input-wrap">
                        <i class="fas fa-user login-input-icon"></i>
                        <input type="text" id="username" name="username" class="login-input" placeholder="Enter username" autocomplete="username" required autofocus>
                    </div>
                </div>

                <div class="login-field">
                    <label class="login-label" for="password">Password</label>
                    <div class="login-input-wrap">
                        <i class="fas fa-lock login-input-icon"></i>
                        <input type="password" id="password" name="password" class="login-input" placeholder="Enter password" autocomplete="current-password" required>
                        <button type="button" class="login-pw-toggle" onclick="togglePw()" id="pw-toggle-btn">
                            <i class="fas fa-eye" id="pw-icon"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="login-btn" id="login-btn">
                    <i class="fas fa-sign-in-alt"></i>
                    Sign in
                </button>
            </form>
        </div>

        <div class="login-footer">
            IdentiFace &nbsp;·&nbsp; Face Recognition Attendance System
        </div>
    </div>
    <script src="{{ url_for('static', filename='admin_login.js') }}"></script>
</body>
</html>
